<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テトリス</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
    color: #eee;
  }
  #app {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  canvas {
    border: 2px solid #444;
    background: #0f0f23;
  }
  #side {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 120px;
  }
  .panel {
    border: 1px solid #444;
    padding: 12px;
    background: #0f0f23;
  }
  .panel h3 {
    font-size: 11px;
    color: #888;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .panel p {
    font-size: 22px;
    font-weight: bold;
  }
  #nextCanvas {
    display: block;
    margin-top: 4px;
  }
  #message {
    position: absolute;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 10px #000;
    display: none;
    pointer-events: none;
  }
  button {
    background: #333;
    color: #eee;
    border: 1px solid #555;
    padding: 8px 12px;
    cursor: pointer;
    font-family: monospace;
    font-size: 13px;
    width: 100%;
  }
  button:hover { background: #444; }
</style>
</head>
<body>
<div id="app">
  <div style="position:relative">
    <canvas id="board" width="300" height="600"></canvas>
    <div id="message"></div>
  </div>
  <div id="side">
    <div class="panel">
      <h3>SCORE</h3>
      <p id="score">0</p>
    </div>
    <div class="panel">
      <h3>LEVEL</h3>
      <p id="level">1</p>
    </div>
    <div class="panel">
      <h3>LINES</h3>
      <p id="lines">0</p>
    </div>
    <div class="panel">
      <h3>NEXT</h3>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
    <button id="startBtn">START</button>
    <div class="panel" style="font-size:11px;color:#888;line-height:1.8">
      ← → 移動<br>
      ↑ 回転<br>
      ↓ ソフトドロップ<br>
      SPACE ハードドロップ
    </div>
  </div>
</div>
<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const COLORS = ['', '#FF4136','#FF851B','#FFDC00','#2ECC40','#0074D9','#B10DC9','#7FDBFF'];

const PIECES = [
  null,
  [[1,1,1,1]],                         // I
  [[2,0],[2,0],[2,2]],                 // J
  [[0,3],[0,3],[3,3]],                 // L
  [[4,4],[4,4]],                       // O
  [[0,5,5],[5,5,0]],                   // S
  [[6,6,0],[0,6,6]],                   // Z
  [[0,7,0],[7,7,7]],                   // T
];

const board = document.getElementById('board');
const ctx = board.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');

let grid, piece, pieceX, pieceY, nextPiece, score, level, lines, gameLoop, running, paused;

// --- BGM (Web Audio API) ---
const NOTE = {
  E5:659.25, B4:493.88, C5:523.25, D5:587.33, A4:440.00,
  G4:392.00, F4:349.23, E4:329.63, A3:220.00, B3:246.94,
  C4:261.63, G3:196.00, F3:174.61
};
// Korobeiniki (Tetris Theme A)
const MELODY = [
  ['E5',1],['B4',.5],['C5',.5],['D5',1],['C5',.5],['B4',.5],
  ['A4',1],['A4',.5],['C5',.5],['E5',1],['D5',.5],['C5',.5],
  ['B4',1.5],['C5',.5],['D5',1],['E5',1],
  ['C5',1],['A4',1],['A4',2],
  ['D5',1.5],['F4',.5],['A4',1],['G4',.5],['F4',.5],
  ['E4',1.5],['C5',.5],['E5',1],['D5',.5],['C5',.5],
  ['B4',1],['B4',.5],['C5',.5],['D5',1],['E5',1],
  ['C5',1],['A4',1],['A4',2],
];
const BASS = [
  ['A3',1],['E4',1],['A3',1],['E4',1],
  ['A3',1],['E4',1],['A3',1],['E4',1],
  ['F3',1],['C4',1],['F3',1],['C4',1],
  ['F3',1],['C4',1],['F3',1],['C4',1],
  ['G3',1],['D4',1],['G3',1],['D4',1],
  ['G3',1],['D4',1],['G3',1],['D4',1],
  ['A3',1],['E4',1],['A3',1],['E4',1],
  ['A3',1],['E4',1],['A3',2],
];

let audioCtx = null, bgmNodes = [], bgmPlaying = false;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSequence(notes, type, gainVal, loop) {
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = gainVal;
  masterGain.connect(audioCtx.destination);

  const BPM = 180, beat = 60 / BPM;
  let t = audioCtx.currentTime + 0.05;
  let totalTime = notes.reduce((s, n) => s + n[1] * beat, 0);

  function schedule(startTime) {
    notes.forEach(([note, dur]) => {
      const freq = NOTE[note];
      if (!freq) { startTime += dur * beat; return; }
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(gainVal, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + dur * beat * 0.9);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(startTime);
      osc.stop(startTime + dur * beat);
      startTime += dur * beat;
    });
    return startTime;
  }

  schedule(t);
  if (loop) {
    const interval = setInterval(() => {
      if (!bgmPlaying) { clearInterval(interval); return; }
      t += totalTime;
      schedule(t);
    }, (totalTime - 0.1) * 1000);
    bgmNodes.push(interval);
  }
  bgmNodes.push(masterGain);
}

function startBGM() {
  stopBGM();
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  bgmPlaying = true;
  playSequence(MELODY, 'square', 0.15, true);
  playSequence(BASS, 'triangle', 0.08, true);
}

function stopBGM() {
  bgmPlaying = false;
  bgmNodes.forEach(n => { try { if (n.disconnect) n.disconnect(); else clearInterval(n); } catch(e){} });
  bgmNodes = [];
}

function pauseBGM() {
  if (audioCtx) audioCtx.suspend();
}

function resumeBGM() {
  if (audioCtx) audioCtx.resume();
}

function newGrid() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randomPiece() {
  return PIECES[Math.floor(Math.random() * 7) + 1];
}

function rotate(p) {
  const rows = p.length, cols = p[0].length;
  return Array.from({length: cols}, (_, c) =>
    Array.from({length: rows}, (_, r) => p[rows - 1 - r][c])
  );
}

function fits(p, x, y) {
  for (let r = 0; r < p.length; r++)
    for (let c = 0; c < p[r].length; c++)
      if (p[r][c]) {
        const nx = x + c, ny = y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && grid[ny][nx]) return false;
      }
  return true;
}

function place() {
  for (let r = 0; r < piece.length; r++)
    for (let c = 0; c < piece[r].length; c++)
      if (piece[r][c] && pieceY + r >= 0)
        grid[pieceY + r][pieceX + c] = piece[r][c];
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(v => v)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
  }
}

function spawnPiece() {
  piece = nextPiece;
  nextPiece = randomPiece();
  pieceX = Math.floor((COLS - piece[0].length) / 2);
  pieceY = -piece.length;
  if (!fits(piece, pieceX, pieceY + 1)) {
    gameOver();
  }
  drawNext();
}

function drawBlock(context, x, y, color, size) {
  context.fillStyle = color;
  context.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(x * size + 1, y * size + 1, size - 2, 4);
}

function ghostY() {
  let gy = pieceY;
  while (fits(piece, pieceX, gy + 1)) gy++;
  return gy;
}

function draw() {
  ctx.clearRect(0, 0, board.width, board.height);

  // grid
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) drawBlock(ctx, c, r, COLORS[grid[r][c]], BLOCK);

  // ghost
  if (running && !paused && piece) {
    const gy = ghostY();
    for (let r = 0; r < piece.length; r++)
      for (let c = 0; c < piece[r].length; c++)
        if (piece[r][c]) {
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fillRect((pieceX + c) * BLOCK + 1, (gy + r) * BLOCK + 1, BLOCK - 2, BLOCK - 2);
        }
  }

  // piece
  if (piece) {
    for (let r = 0; r < piece.length; r++)
      for (let c = 0; c < piece[r].length; c++)
        if (piece[r][c] && pieceY + r >= 0)
          drawBlock(ctx, pieceX + c, pieceY + r, COLORS[piece[r][c]], BLOCK);
  }

  // grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(COLS * BLOCK, r * BLOCK); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, ROWS * BLOCK); ctx.stroke();
  }
}

function drawNext() {
  nctx.clearRect(0, 0, 120, 120);
  const size = 24;
  const offsetX = Math.floor((5 - nextPiece[0].length) / 2);
  const offsetY = Math.floor((5 - nextPiece.length) / 2);
  for (let r = 0; r < nextPiece.length; r++)
    for (let c = 0; c < nextPiece[r].length; c++)
      if (nextPiece[r][c])
        drawBlock(nctx, offsetX + c, offsetY + r, COLORS[nextPiece[r][c]], size);
}

function tick() {
  if (!fits(piece, pieceX, pieceY + 1)) {
    place();
    clearLines();
    spawnPiece();
  } else {
    pieceY++;
  }
  draw();
}

function startGame() {
  grid = newGrid();
  score = 0; level = 1; lines = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('level').textContent = 1;
  document.getElementById('lines').textContent = 0;
  document.getElementById('message').style.display = 'none';
  nextPiece = randomPiece();
  spawnPiece();
  running = true;
  paused = false;
  document.getElementById('startBtn').textContent = 'PAUSE';
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, Math.max(100, 700 - (level - 1) * 60));
  startBGM();
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  const msg = document.getElementById('message');
  msg.textContent = 'GAME OVER';
  msg.style.display = 'block';
  msg.style.top = '50%';
  msg.style.left = '50%';
  msg.style.transform = 'translate(-50%, -50%)';
  document.getElementById('startBtn').textContent = 'RETRY';
  stopBGM();
}

document.getElementById('startBtn').addEventListener('click', () => {
  if (!running) {
    startGame();
  } else {
    paused = !paused;
    if (paused) {
      clearInterval(gameLoop);
      pauseBGM();
      document.getElementById('startBtn').textContent = 'RESUME';
    } else {
      gameLoop = setInterval(tick, Math.max(100, 700 - (level - 1) * 60));
      resumeBGM();
      document.getElementById('startBtn').textContent = 'PAUSE';
    }
  }
});

document.addEventListener('keydown', e => {
  if (!running || paused) return;
  switch(e.key) {
    case 'ArrowLeft':
      if (fits(piece, pieceX - 1, pieceY)) pieceX--;
      break;
    case 'ArrowRight':
      if (fits(piece, pieceX + 1, pieceY)) pieceX++;
      break;
    case 'ArrowDown':
      if (fits(piece, pieceX, pieceY + 1)) { pieceY++; score += 1; document.getElementById('score').textContent = score; }
      break;
    case 'ArrowUp':
      const r = rotate(piece);
      if (fits(r, pieceX, pieceY)) piece = r;
      break;
    case ' ':
      e.preventDefault();
      while (fits(piece, pieceX, pieceY + 1)) { pieceY++; score += 2; }
      document.getElementById('score').textContent = score;
      tick();
      break;
  }
  draw();
});

draw();
</script>
</body>
</html>
