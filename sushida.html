<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>寿司打</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a0a00;
  font-family: 'MS Gothic', monospace;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 900px;
  padding: 12px 0 8px;
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #aaa; letter-spacing: 1px; }
.stat-value { font-size: 28px; font-weight: bold; color: #FFD700; }
#timer-val { color: #ff6b6b; }

#stage {
  width: 900px;
  height: 340px;
  position: relative;
  background: linear-gradient(180deg, #0a0018 0%, #0d0030 100%);
  border: 1px solid #333;
  overflow: hidden;
}

/* 背景装飾 */
#stage::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(180deg, transparent, rgba(0,100,200,0.15));
}

.sushi-plate {
  position: absolute;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: none;
}

.plate-dish {
  width: 110px;
  height: 28px;
  background: linear-gradient(180deg, #f0e8d0 0%, #d4c8a0 100%);
  border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
  border: 2px solid #b8a878;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 0 3px 8px rgba(0,0,0,0.5);
}

.plate-dish::after {
  content: '';
  position: absolute;
  top: 3px; left: 10px; right: 10px;
  height: 4px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
}

.sushi-emoji {
  font-size: 20px;
  line-height: 1;
}

.plate-word {
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 1px 3px #000;
  white-space: nowrap;
}

.plate-romaji {
  font-size: 12px;
  color: #adf;
  white-space: nowrap;
}

.plate-price {
  font-size: 11px;
  color: #FFD700;
}

.sushi-plate.active .plate-dish {
  background: linear-gradient(180deg, #fff5cc 0%, #ffe88a 100%);
  border-color: #ffcc00;
  box-shadow: 0 0 12px rgba(255,200,0,0.6), 0 3px 8px rgba(0,0,0,0.5);
}

.sushi-plate.missed {
  opacity: 0.3;
}

/* コンベア */
#conveyor {
  width: 900px;
  height: 24px;
  background: repeating-linear-gradient(
    90deg,
    #444 0px, #444 40px,
    #555 40px, #555 80px
  );
  border-top: 3px solid #666;
  border-bottom: 3px solid #333;
  position: relative;
  overflow: hidden;
}
#conveyor::after {
  content: '';
  position: absolute;
  top: 8px; left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.1);
}

/* 入力エリア */
#input-area {
  width: 900px;
  margin-top: 16px;
  background: #0f0820;
  border: 1px solid #333;
  padding: 20px 24px;
}

#current-word {
  font-size: 36px;
  font-weight: bold;
  color: #fff;
  letter-spacing: 4px;
  margin-bottom: 8px;
  min-height: 44px;
}

#romaji-display {
  font-size: 20px;
  letter-spacing: 2px;
  min-height: 28px;
  margin-bottom: 12px;
}

.romaji-typed { color: #4CAF50; }
.romaji-cursor { color: #FFD700; border-bottom: 2px solid #FFD700; }
.romaji-pending { color: #666; }

#typed-input {
  width: 100%;
  background: #1a1030;
  border: 1px solid #555;
  color: #fff;
  font-size: 18px;
  padding: 8px 12px;
  font-family: monospace;
  outline: none;
  letter-spacing: 2px;
}
#typed-input:focus { border-color: #FFD700; }
#typed-input.error { border-color: #ff4444; background: #2a0000; }

/* スタート画面 / リザルト */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
}
#overlay h1 { font-size: 52px; color: #FFD700; text-shadow: 0 0 20px #ffaa00; }
#overlay p { font-size: 18px; color: #ccc; }
.result-table { font-size: 20px; line-height: 2; }
.result-table td:first-child { color: #aaa; padding-right: 24px; }
.result-table td:last-child { color: #FFD700; font-weight: bold; font-size: 24px; }

select, button {
  background: #222;
  color: #fff;
  border: 1px solid #555;
  padding: 10px 24px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}
button { background: #8B0000; border-color: #ff4444; font-size: 20px; padding: 12px 40px; }
button:hover { background: #aa0000; }

#miss-indicator {
  position: absolute;
  font-size: 24px;
  font-weight: bold;
  color: #ff4444;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="header">
  <div class="stat">
    <div class="stat-label">スコア</div>
    <div class="stat-value" id="score-val">¥0</div>
  </div>
  <div class="stat">
    <div class="stat-label">正解数</div>
    <div class="stat-value" id="correct-val">0</div>
  </div>
  <div class="stat" style="font-size:32px; color:#ff6b6b; font-weight:bold;">🍣 寿司打</div>
  <div class="stat">
    <div class="stat-label">ミス</div>
    <div class="stat-value" id="miss-val" style="color:#ff6b6b">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">残り時間</div>
    <div class="stat-value" id="timer-val">60</div>
  </div>
</div>

<div id="stage">
  <div id="miss-indicator">MISS!</div>
</div>
<div id="conveyor"></div>

<div id="input-area">
  <div id="current-word">－</div>
  <div id="romaji-display"></div>
  <input type="text" id="typed-input" placeholder="ここに入力..." autocomplete="off" spellcheck="false">
</div>

<div id="overlay">
  <h1>🍣 寿司打</h1>
  <p>流れてくるお寿司のローマ字を入力しよう！</p>
  <div style="display:flex;gap:12px;align-items:center">
    <label style="color:#aaa">難易度：</label>
    <select id="difficulty">
      <option value="easy">かんたん（ひらがな）</option>
      <option value="normal" selected>ふつう（単語）</option>
      <option value="hard">むずかしい（フレーズ）</option>
    </select>
  </div>
  <button id="start-btn">スタート</button>
</div>

<script>
const SUSHI = ['🐱','😺','😸','😹','😻','😼','😽','🙀','😾','🐈'];

const WORDS = {
  easy: [
    {ja:'あ',r:'a'},{ja:'い',r:'i'},{ja:'う',r:'u'},{ja:'え',r:'e'},{ja:'お',r:'o'},
    {ja:'か',r:'ka'},{ja:'き',r:'ki'},{ja:'く',r:'ku'},{ja:'さ',r:'sa'},{ja:'し',r:'si'},
    {ja:'た',r:'ta'},{ja:'て',r:'te'},{ja:'な',r:'na'},{ja:'に',r:'ni'},{ja:'は',r:'ha'},
    {ja:'ま',r:'ma'},{ja:'み',r:'mi'},{ja:'や',r:'ya'},{ja:'ゆ',r:'yu'},{ja:'よ',r:'yo'},
    {ja:'ら',r:'ra'},{ja:'り',r:'ri'},{ja:'る',r:'ru'},{ja:'れ',r:'re'},{ja:'わ',r:'wa'},
    {ja:'かき',r:'kaki'},{ja:'くも',r:'kumo'},{ja:'そら',r:'sora'},{ja:'うみ',r:'umi'},
  ],
  normal: [
    {ja:'すし',r:'sushi',p:300},{ja:'さかな',r:'sakana',p:200},{ja:'たこ',r:'tako',p:150},
    {ja:'えび',r:'ebi',p:200},{ja:'まぐろ',r:'maguro',p:400},{ja:'いか',r:'ika',p:150},
    {ja:'うに',r:'uni',p:500},{ja:'はまち',r:'hamachi',p:350},{ja:'さんま',r:'sanma',p:250},
    {ja:'あじ',r:'aji',p:200},{ja:'こはだ',r:'kohada',p:250},{ja:'とろ',r:'toro',p:600},
    {ja:'あわび',r:'awabi',p:500},{ja:'たまご',r:'tamago',p:100},{ja:'いくら',r:'ikura',p:400},
    {ja:'なっとう',r:'nattou',p:150},{ja:'かっぱ',r:'kappa',p:100},{ja:'てっか',r:'tekka',p:300},
    {ja:'しゃけ',r:'syake',p:250},{ja:'ほたて',r:'hotate',p:350},{ja:'あなご',r:'anago',p:300},
    {ja:'とびこ',r:'tobiko',p:200},{ja:'まつり',r:'maturi',p:200},{ja:'おすし',r:'osushi',p:250},
    {ja:'おちゃ',r:'otya',p:50},{ja:'しょうゆ',r:'syouyu',p:100},{ja:'わさび',r:'wasabi',p:150},
    {ja:'ぎょく',r:'gyoku',p:150},{ja:'しゃり',r:'syari',p:100},{ja:'ねた',r:'neta',p:100},
  ],
  hard: [
    {ja:'いらっしゃいませ',r:'irassyaimase',p:800},
    {ja:'おまかせください',r:'omakasekudasai',p:900},
    {ja:'本日のおすすめ',r:'honjitunoosusume',p:700},
    {ja:'おあいそください',r:'oaisokudasai',p:600},
    {ja:'ありがとうございます',r:'arigatougozaimasu',p:1000},
    {ja:'いただきます',r:'itadakimasu',p:500},
    {ja:'まぐろのとろ',r:'maguronootoro',p:700},
    {ja:'ぐんかんまき',r:'gunkanmaki',p:600},
    {ja:'てまきずし',r:'temakizushi',p:600},
    {ja:'ちらしずし',r:'tirashizushi',p:600},
    {ja:'にぎりずし',r:'nigirizushi',p:500},
    {ja:'おすしやさん',r:'osushiyasan',p:550},
    {ja:'かいてんずし',r:'kaitenzushi',p:650},
    {ja:'さしみもりあわせ',r:'sashimimoriawase',p:800},
    {ja:'おこのみでどうぞ',r:'okonomidedouzo',p:750},
  ],
};

let score = 0, correct = 0, miss = 0, timeLeft = 60;
let plates = [], activeIdx = -1, typedRomaji = '';
let gameTimer = null, moveTimer = null;
let difficulty = 'normal';

const stage = document.getElementById('stage');
const stageW = 900;
const PLATE_SPEED = { easy: 1.2, normal: 1.8, hard: 2.4 };
const SPAWN_INTERVAL = { easy: 3500, normal: 2800, hard: 2200 };
const PLATE_PRICE = { easy: 100, normal: 200, hard: 400 };

function getWords() { return WORDS[difficulty]; }

function randWord() {
  const list = getWords();
  return list[Math.floor(Math.random() * list.length)];
}

function createPlate(word) {
  const el = document.createElement('div');
  el.className = 'sushi-plate';
  const price = word.p || PLATE_PRICE[difficulty];
  el.innerHTML = `
    <div class="plate-price">¥${price}</div>
    <div class="plate-word">${word.ja}</div>
    <div class="plate-dish"><span class="sushi-emoji">${SUSHI[Math.floor(Math.random()*SUSHI.length)]}</span></div>
    <div class="plate-romaji">${word.r}</div>
  `;
  el.style.left = stageW + 'px';
  el.style.bottom = (20 + Math.random() * 120) + 'px';
  stage.appendChild(el);

  const plate = { el, word, x: stageW, missed: false, eaten: false, price };
  plates.push(plate);
  if (activeIdx === -1) setActive(plates.length - 1);
  return plate;
}

function setActive(idx) {
  plates.forEach((p, i) => p.el.classList.toggle('active', i === idx));
  activeIdx = idx;
  typedRomaji = '';
  if (idx >= 0) updateDisplay(plates[idx]);
  else clearDisplay();
}

function updateDisplay(plate) {
  document.getElementById('current-word').textContent = plate.word.ja;
  const r = plate.word.r;
  const typed = typedRomaji.length;
  document.getElementById('romaji-display').innerHTML =
    `<span class="romaji-typed">${r.slice(0, typed)}</span>` +
    `<span class="romaji-cursor">${r[typed] || ''}</span>` +
    `<span class="romaji-pending">${r.slice(typed + 1)}</span>`;
}

function clearDisplay() {
  document.getElementById('current-word').textContent = '－';
  document.getElementById('romaji-display').innerHTML = '';
}

function showMiss(plate) {
  const ind = document.getElementById('miss-indicator');
  ind.style.left = plate.x + 'px';
  ind.style.bottom = '80px';
  ind.style.opacity = '1';
  setTimeout(() => ind.style.opacity = '0', 500);
}

let lastTime = null;
function movePlates(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  const speed = PLATE_SPEED[difficulty];
  for (let i = plates.length - 1; i >= 0; i--) {
    const p = plates[i];
    if (p.eaten) continue;
    p.x -= speed * dt / 16;
    p.el.style.left = p.x + 'px';

    if (p.x < -130 && !p.missed) {
      p.missed = true;
      p.el.classList.add('missed');
      miss++;
      score = Math.max(0, score - p.price);
      document.getElementById('miss-val').textContent = miss;
      document.getElementById('score-val').textContent = '¥' + score;
      showMiss(p);
      if (i === activeIdx) {
        const next = plates.findIndex((pp, ii) => ii !== i && !pp.eaten && !pp.missed);
        setActive(next);
      }
    }
    if (p.x < -200) {
      p.el.remove();
      plates.splice(i, 1);
      if (i <= activeIdx) activeIdx--;
    }
  }

  if (activeIdx < 0 || activeIdx >= plates.length) {
    const next = plates.findIndex(p => !p.eaten && !p.missed);
    if (next >= 0) setActive(next);
  }

  if (gameTimer) requestAnimationFrame(movePlates);
}

function eatPlate(idx) {
  const plate = plates[idx];
  plate.eaten = true;
  plate.el.style.transition = 'transform 0.3s, opacity 0.3s';
  plate.el.style.transform = 'scale(1.3) translateY(-20px)';
  plate.el.style.opacity = '0';
  setTimeout(() => {
    const spliceIdx = plates.indexOf(plate);
    if (spliceIdx < 0) return;
    plate.el.remove();
    plates.splice(spliceIdx, 1);
    if (spliceIdx < activeIdx) activeIdx--;
  }, 300);

  score += plate.price;
  correct++;
  document.getElementById('score-val').textContent = '¥' + score;
  document.getElementById('correct-val').textContent = correct;

  // 次のアクティブ
  const next = plates.findIndex(p => !p.eaten && !p.missed);
  setActive(next >= 0 ? next : -1);
  typedRomaji = '';
  const inp = document.getElementById('typed-input');
  inp.value = '';
  inp.classList.remove('error');
}

document.addEventListener('keydown', e => {
  if (!gameTimer) return;
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (e.key.length !== 1 || !/[a-zA-Z]/.test(e.key)) return;
  e.preventDefault();

  if (activeIdx < 0 || activeIdx >= plates.length) return;

  const char = e.key.toLowerCase();
  const plate = plates[activeIdx];
  const target = plate.word.r;
  const newTyped = typedRomaji + char;
  const inp = document.getElementById('typed-input');

  if (target.startsWith(newTyped)) {
    typedRomaji = newTyped;
    inp.value = newTyped;
    inp.classList.remove('error');
    updateDisplay(plate);
    if (newTyped === target) eatPlate(activeIdx);
  } else {
    inp.classList.add('error');
    setTimeout(() => inp.classList.remove('error'), 150);
  }
});

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  difficulty = document.getElementById('difficulty').value;
  score = 0; correct = 0; miss = 0; timeLeft = 60;
  plates.forEach(p => p.el.remove());
  plates = []; activeIdx = -1; typedRomaji = '';
  document.getElementById('score-val').textContent = '¥0';
  document.getElementById('correct-val').textContent = '0';
  document.getElementById('miss-val').textContent = '0';
  document.getElementById('timer-val').textContent = '60';
  document.getElementById('typed-input').value = '';
  clearDisplay();

  // 最初の皿
  createPlate(randWord());
  setTimeout(() => createPlate(randWord()), 1000);

  // スポーン
  const spawnWord = () => {
    if (!gameTimer) return;
    createPlate(randWord());
    spawnTimer = setTimeout(spawnWord, SPAWN_INTERVAL[difficulty]);
  };
  let spawnTimer = setTimeout(spawnWord, SPAWN_INTERVAL[difficulty]);

  // タイマー
  gameTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('timer-val').textContent = timeLeft;
    if (timeLeft <= 0) endGame(spawnTimer);
  }, 1000);

  lastTime = null;
  requestAnimationFrame(movePlates);
  document.getElementById('typed-input').focus();
}

function endGame(spawnTimer) {
  clearInterval(gameTimer);
  clearTimeout(spawnTimer);
  gameTimer = null;

  const acc = correct + miss > 0 ? Math.round(correct / (correct + miss) * 100) : 0;
  const ol = document.getElementById('overlay');
  ol.innerHTML = `
    <h1>🍣 結果発表</h1>
    <table class="result-table">
      <tr><td>スコア</td><td>¥${score.toLocaleString()}</td></tr>
      <tr><td>正解数</td><td>${correct} 皿</td></tr>
      <tr><td>ミス数</td><td>${miss} 皿</td></tr>
      <tr><td>正解率</td><td>${acc}%</td></tr>
    </table>
    <p style="color:#aaa;font-size:14px">難易度: ${{easy:'かんたん',normal:'ふつう',hard:'むずかしい'}[difficulty]}</p>
    <div style="display:flex;gap:12px;align-items:center">
      <label style="color:#aaa">難易度：</label>
      <select id="difficulty">
        <option value="easy"${difficulty==='easy'?' selected':''}>かんたん（ひらがな）</option>
        <option value="normal"${difficulty==='normal'?' selected':''}>ふつう（単語）</option>
        <option value="hard"${difficulty==='hard'?' selected':''}>むずかしい（フレーズ）</option>
      </select>
    </div>
    <button id="start-btn">もう一度</button>
  `;
  ol.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
